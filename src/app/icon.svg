<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1c2540"/>
      <stop offset="60%" stop-color="#131a2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7c6cf0" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Hintergrund-Sterne -->
  <circle cx="104" cy="118" r="5" fill="#9db4ff" opacity="0.75"/>
  <circle cx="422" cy="356" r="4" fill="#9db4ff" opacity="0.6"/>
  <circle cx="132" cy="396" r="3" fill="#5ee6ff" opacity="0.55"/>
  <circle cx="376" cy="88" r="3" fill="#b8e8ff" opacity="0.6"/>

  <!-- Erzkristall: vier Facetten, Cyan -> Violett -->
  <g filter="url(#glow)">
    <polygon points="256,84 148,262 256,262" fill="#b8e8ff"/>
    <polygon points="256,84 364,262 256,262" fill="#5ee6ff"/>
    <polygon points="148,262 256,436 256,262" fill="#4c9ef0"/>
    <polygon points="364,262 256,436 256,262" fill="#7c6cf0"/>
    <polygon points="256,84 364,262 256,436 148,262" fill="none"
      stroke="url(#edge)" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- Facetten-Kanten -->
  <path d="M148 262h216M256 84v352" stroke="#0a0e1a" stroke-opacity="0.35" stroke-width="6"/>

  <!-- Stern-Funkeln -->
  <path d="M404 122c3 22 8 27 30 30-22 3-27 8-30 30-3-22-8-27-30-30 22-3 27-8 30-30z"
    fill="#b8e8ff"/>
  <path d="M120 322c2 13 5 16 18 18-13 2-16 5-18 18-2-13-5-16-18-18 13-2 16-5 18-18z"
    fill="#5ee6ff" opacity="0.85"/>
</svg>
