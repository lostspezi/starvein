name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  jsdoc:
    name: jsdoc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:jsdoc

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Nur Runtime-Deps, nur High/Critical: ergänzt CodeQL + dependency-review
      # um bekannte CVEs in installierten Paketen (CLAUDE.md-Härtung Juli 2026).
      - run: pnpm audit --prod --audit-level high

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Write .env.local for seed and Next.js server
        run: |
          # next start läuft als production → src/lib/env.ts erzwingt starke,
          # nicht-Platzhalter-Secrets (>=16 Zeichen). Deshalb hier valide
          # Wegwerf-Secrets statt "ci-only-secret".
          cat > .env.local <<'EOF'
          MONGODB_URI=mongodb://localhost:27017/starvein
          REDIS_URL=redis://localhost:6379
          BETTER_AUTH_URL=http://localhost:3100
          BETTER_AUTH_SECRET=ci-only-secret-0123456789abcdef
          SYNC_SECRET=ci-only-sync-secret-0123456789
          EOF
      - run: pnpm seed
      # Blueprints/Materialien liefert nicht der Seed, sondern der Wiki-Sync
      # (einzige Quelle für Crafting-Rezepte). Ohne diesen Schritt laufen die
      # Blueprint-e2e-Tests gegen eine leere Collection. Der Schritt hängt an
      # der externen Wiki-API — fällt sie aus, ist die CI rot, dafür ist sie
      # zugleich Kanarienvogel für Schema-Änderungen der API.
      - run: pnpm sync:wiki
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  desktop:
    name: desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter "@starvein/desktop" test
      - run: pnpm --filter "@starvein/desktop" typecheck
      # Frontend-Build vor den Rust-Checks: tauri::generate_context! bettet
      # die Assets aus ../dist ein und braucht das Verzeichnis zur Compile-Zeit.
      - run: pnpm --filter "@starvein/desktop" build
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo fmt --check
        working-directory: apps/desktop/src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop/src-tauri
      - run: cargo test
        working-directory: apps/desktop/src-tauri

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # GHSA-wrw7-89jp-8q8g (glib 0.18, VariantStrIter-Unsoundness):
          # Linux-only transitive Dependency des Tauri-GTK-Stacks — steht im
          # Cargo.lock, wird für unser Windows-Target aber nie kompiliert.
          # gtk-rs 0.18 pinnt glib 0.18; Bump erst mit Tauris GTK-Update
          # möglich. Bei Linux-Support vor dem Update neu bewerten.
          allow-ghsas: GHSA-wrw7-89jp-8q8g
