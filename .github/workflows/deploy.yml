name: Deploy

on:
  # Continuous Deployment: läuft nach jedem grünen CI-Lauf auf main …
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # … und ist zusätzlich manuell auslösbar.
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: build-and-push
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ghcr.io/lostspezi/starvein:latest
            ghcr.io/lostspezi/starvein:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push jobs image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: jobs
          push: true
          tags: |
            ghcr.io/lostspezi/starvein-jobs:latest
            ghcr.io/lostspezi/starvein-jobs:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
      - name: Sync compose files to VPS
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.prod.yml Caddyfile \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/starvein/"
      # --profile jobs, weil "docker compose pull" ohne aktives Profil den
      # profil-gegateten jobs-Service überspringt. Ohne das bleibt auf dem VPS
      # das alte jobs-Image liegen ("run" zieht nur, wenn gar keins da ist) —
      # Seed und Sync liefen dann gegen veralteten Code. "up -d" ohne Profil
      # startet den One-Shot-Container weiterhin nicht.
      - name: Pull images and restart stack
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /opt/starvein && \
             docker compose -f docker-compose.prod.yml --profile jobs pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans"
      - name: Seed curated data (idempotent upserts)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /opt/starvein && \
             docker compose -f docker-compose.prod.yml run --rm jobs"
      - name: Verify health endpoint
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "for i in \$(seq 1 20); do \
               if docker compose -f /opt/starvein/docker-compose.prod.yml exec -T app \
                 node -e \"fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"; then \
                 echo 'app healthy'; exit 0; \
               fi; sleep 3; \
             done; echo 'app failed health check'; exit 1"
      # Nach dem Health-Check, nicht davor: Blueprints/Materialien liefert nur
      # dieser Sync (der Seed kennt sie nicht), aber es sind reine Daten. Läuft
      # er vorher und schlägt fehl, wird der Health-Check übersprungen und ein
      # Datenproblem sieht aus wie ein kaputtes Deployment. Idempotent; der
      # laufende Patch-Abgleich ist der Cron aus docs/DEPLOY.md.
      - name: Sync crafting blueprints from the SC Wiki (idempotent)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /opt/starvein && \
             docker compose -f docker-compose.prod.yml run --rm jobs \
               pnpm exec tsx scripts/sync-wiki.ts"
