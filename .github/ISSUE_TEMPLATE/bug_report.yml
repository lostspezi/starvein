name: Bug report
description: Something in STARVEIN is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! For **wrong mining data**
        (probabilities, signature values), please use the in-app community
        correction flow instead — issues are for broken behavior.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
      placeholder: When I filter ores by ROC on /en/ores, the list stays empty although …
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Affected page / URL
      placeholder: https://starvein.app/en/loadouts
    validations:
      required: true
  - type: input
    id: sc-patch
    attributes:
      label: Star Citizen patch version
      description: If the bug is about game data, which patch does it refer to?
      placeholder: "4.8.0"
  - type: input
    id: browser
    attributes:
      label: Browser & device
      placeholder: Firefox 141 on Windows 11 / Safari on iPhone 15
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console errors, steps to reproduce …
