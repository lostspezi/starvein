name: Feature request
description: Suggest an idea or improvement for STARVEIN.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the miner's pain point, not the solution yet.
      placeholder: As a MOLE pilot I can't quickly compare two locations for Quantanium …
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough ideas are fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use today, other tools, other approaches.
